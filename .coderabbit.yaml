language: en-US
reviews:
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "**/*.ts"
      instructions: "Review for TypeScript best practices, type safety, and ensure no placeholder data (url: '#') remains."
    - path: "**/*.tsx"
      instructions: "Review React components for accessibility, performance (unnecessary re-renders), and proper use of client/server components in Next.js App Router."
    - path: "data/**"
      instructions: "Verify all resource URLs are valid (not placeholders), resource types match the union type, and data structure consistency across phases."
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - master
chat:
  auto_reply: true
